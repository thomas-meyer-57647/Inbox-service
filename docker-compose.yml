version: "3.9"

services:
  mariadb:
    image: mariadb:11.4
    container_name: inbox-mariadb
    environment:
      MARIADB_DATABASE: inbox
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - mariadb_data:/var/lib/mysql

  inbox-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inbox-service
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mariadb://mariadb:3306/inbox
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      INBOX_SECURITY_INTERNAL_TOKEN: change-me
    ports:
      - "8082:8082"

volumes:
  mariadb_data:
