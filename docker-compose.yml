version: "3.9"

services:
  mariadb:
    image: mariadb:11.4
    container_name: inbox-mariadb
    environment:
      MARIADB_DATABASE: ${INBOX_DB_NAME:-inbox}
      MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: "yes"
    ports:
      - "${INBOX_DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - mariadb_data:/var/lib/mysql

  inbox-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inbox-service
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      INBOX_DB_HOST: ${INBOX_DB_HOST:-mariadb}
      INBOX_DB_PORT: ${INBOX_DB_PORT:-3306}
      INBOX_DB_NAME: ${INBOX_DB_NAME:-inbox}
      INBOX_DB_USER: ${INBOX_DB_USER:-root}
      INBOX_DB_PASSWORD: ${INBOX_DB_PASSWORD:-}
      INBOXPORT: ${INBOXPORT:-8105}
      INBOX_INTERNAL_TOKEN: ${INBOX_INTERNAL_TOKEN:-change-me}
    ports:
      - "${INBOXPORT:-8105}:${INBOXPORT:-8105}"

volumes:
  mariadb_data:
