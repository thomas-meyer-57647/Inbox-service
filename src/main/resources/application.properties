spring.application.name=inbox-service
server.port=${INBOXPORT:8105}
server.servlet.context-path=/api/v1

spring.datasource.url=jdbc:mariadb://${INBOX_DB_HOST:localhost}:${INBOX_DB_PORT:3306}/${INBOX_DB_NAME:inbox}
spring.datasource.username=${INBOX_DB_USER:root}
spring.datasource.password=${INBOX_DB_PASSWORD:}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO

inbox.security.internal-token=${INBOX_INTERNAL_TOKEN:change-me}
inbox.security.jwt-secret=change-me-change-me-change-me-change-me
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${INBOX_JWKS_URI:http://localhost:9999/jwks}
